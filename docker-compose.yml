services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: chartdb-backend
        ports:
            - '8099:3001'
        environment:
            - DATABASE_URL=file:/usr/src/app/server/prisma/dev.db
            - PORT=3001
            - NODE_ENV=development
        volumes:
            - .:/usr/src/app
            - /usr/src/app/node_modules
            - ./server/prisma:/usr/src/app/server/prisma
        command: npm run dev:server
        restart: unless-stopped

    frontend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                - VITE_API_URL=http://localhost:8099
        container_name: chartdb-frontend
        ports:
            - '8098:4173'
        environment:
            - NODE_ENV=production
        depends_on:
            - backend
        restart: unless-stopped
        command: npx vite preview --host --port 4173
